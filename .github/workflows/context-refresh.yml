name: Refresh agent context
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE: Keeps agent-context.json up to date in the repo that runs this.
#
# HOW IT GETS THERE:
#   - In agent-ready itself: triggered on schedule to keep agent-ready's own
#     agent-context.json fresh.
name: "AgentReady: Weekly Context Refresh"
# ──────────────────────────────────────────────
# Keeps agent-context.json up to date in this repo.
#
# USAGE:
#   - In agent-ready: runs weekly & on demand
#   - In target repos: installed by installer, runs weekly
#   - Can be called via workflow_call for up-to-date context
#
# WHAT IT DOES:
#   1. Runs transformer in context-only mode
#   2. If agent-context.json changed, opens a PR
#   3. If no drift, prints success
# ──────────────────────────────────────────────

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Allow manual trigger from Actions tab
  workflow_call:            # Allow target repos to call this directly

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check out agentic toolkit
        uses: actions/checkout@v4
        with:
          repository: vb-nattamai/agent-ready
          path: .agentic-toolkit

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade packaging toolchain
        run: |
          python -m pip install --upgrade pip setuptools wheel build

      - name: Install agentic toolkit
        run: |
          python -m pip install ./.agentic-toolkit

      - name: Run context-only refresh
        run: |
          python .agentic-toolkit/scripts/run_transformer.py \
            --target . --only context --force --quiet

      - name: Check for drift
        id: drift
        run: |
          # Ignore last_scanned timestamp — it changes every run and is not meaningful drift.
          # Only open a PR if structural content (module_layout, commands, languages, etc.) changed.
          MEANINGFUL_DIFF=$(git diff agent-context.json \
            | grep -v '"last_scanned"' \
            | grep -E '^[+-][^+-]' || true)
          if [ -z "$MEANINGFUL_DIFF" ]; then
            echo "drifted=false" >> $GITHUB_OUTPUT
          else
            echo "drifted=true" >> $GITHUB_OUTPUT
          fi

      - name: Open drift PR
        if: steps.drift.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="agentic-ready/context-refresh-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add agent-context.json
          git commit -m "chore: refresh agent-context.json [skip ci]"
          git push origin "$BRANCH"
          
          cat > /tmp/pr_body.txt <<'PRBODY'
          ## 🤖 Agent Context Drift Detected

          The scheduled context refresh found that `agent-context.json` no longer
          matches the current state of the repository.

          This can happen when:
          - New modules, services, or packages were added
          - Entry points or build commands changed
          - New environment variables were introduced

          ### What changed
          See the diff in this PR for the exact changes.

          ### Before merging
          - [ ] Verify `domain_concepts` still reflects real terms from the codebase
          - [ ] Verify `restricted_write_paths` is still accurate
          - [ ] Verify `environment_variables` covers all new vars introduced since last scan
          PRBODY
          
          gh pr create \
            --title "🤖 Agent context drift detected — refresh required" \
            --body-file /tmp/pr_body.txt \
            --label "agentic-ready" \
            --base main

      - name: No drift
        if: steps.drift.outputs.drifted == 'false'
        run: echo "✅ agent-context.json is up to date. No PR needed."
