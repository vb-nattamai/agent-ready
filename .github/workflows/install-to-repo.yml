name: Install Agentic Ready to Repo

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (e.g., myorg/my-app)'
        required: true
        type: string
      target_branch:
        description: 'Branch to commit to'
        required: false
        default: 'main'
        type: string

jobs:
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Validate inputs
        run: |
          if [[ ! "${{ inputs.target_repo }}" =~ ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$ ]]; then
            echo "❌ Invalid repo format. Use: owner/repo"
            exit 1
          fi
          echo "✅ Installing to: ${{ inputs.target_repo }}@${{ inputs.target_branch }}"

      - name: Checkout toolkit (for workflow template)
        uses: actions/checkout@v4
        with:
          path: toolkit

      - name: Create issue-trigger workflow in target repo
        env:
          GH_TOKEN: ${{ secrets.INSTALL_TOKEN || github.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          # Clone target repo using the token for auth
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" target-repo
          cd target-repo

          mkdir -p .github/workflows
          cp ../toolkit/templates/install-workflow.yml .github/workflows/agentic-ready.yml

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "ℹ️  Workflow already up to date, nothing to commit"
          else
            git add .github/workflows/agentic-ready.yml
            if git ls-remote --heads origin "refs/heads/${TARGET_BRANCH}" | grep -q "${TARGET_BRANCH}"; then
              git commit -m "feat: add AgentReady automation workflow"
              git push origin "HEAD:${TARGET_BRANCH}"
              echo "✅ Workflow committed to ${TARGET_REPO}@${TARGET_BRANCH}"
            else
              echo "❌ Branch ${TARGET_BRANCH} not found in ${TARGET_REPO}"
              exit 1
            fi
          fi

      - name: Report result
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          echo "✅ Installation complete!"
          echo ""
          echo "Next steps:"
          echo "1. Go to: https://github.com/$TARGET_REPO"
          echo "2. Create an issue titled: [agentic-ready] Transform this repo"
          echo "3. The workflow will trigger automatically"
          echo ""
          echo "Commit URL:"
          echo "https://github.com/$TARGET_REPO/blob/$TARGET_BRANCH/.github/workflows/agentic-ready.yml"
