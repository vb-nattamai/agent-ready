name: Reusable Agentic Ready Transformer

on:
  workflow_call:
    inputs:
      target_branch:
        description: 'Base branch to create PR against'
        required: false
        default: 'main'
        type: string
      only:
        description: 'Pass to --only flag (agents|tools|context|memory), empty = all'
        required: false
        default: ''
        type: string
      force:
        description: 'Pass --force to overwrite existing files'
        required: false
        default: false
        type: boolean
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Optional Anthropic API key for LLM-enhanced generation'
        required: false
      OPENAI_API_KEY:
        description: 'Optional OpenAI API key'
        required: false
      GOOGLE_API_KEY:
        description: 'Optional Google API key'
        required: false

jobs:
  transform:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout toolkit repository
        uses: actions/checkout@v4
        with:
          repository: vb-nattamai/legacy-to-agentic-ready
          path: .agentic-toolkit
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f .agentic-toolkit/requirements.txt ]; then
            pip install -q anthropic || echo "⚠️  anthropic not available, using static mode"
          fi

      - name: Configure git
        run: |
          git config --local user.email "agentic-ready@github.com"
          git config --local user.name "Agentic Ready Bot"

      - name: Run transformer
        id: transform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd "$(pwd)"
          
          # Build command
          CMD="python .agentic-toolkit/scripts/run_transformer.py --target ."
          [ -n "${{ inputs.only }}" ] && CMD="$CMD --only ${{ inputs.only }}"
          [ "${{ inputs.force }}" = "true" ] && CMD="$CMD --force"
          
          echo "Running: $CMD"
          echo ""
          
          $CMD
          
          # Check if files were generated
          if git diff --quiet; then
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date"
          else
            echo "generated=true" >> $GITHUB_OUTPUT
            echo "✅ Files generated"
          fi

      - name: Create branch and commit (if files generated)
        if: steps.transform.outputs.generated == 'true'
        run: |
          BRANCH_NAME="agentic-ready/init"
          
          # Check if branch exists
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            BRANCH_NAME="agentic-ready/update"
          fi
          
          git checkout -b $BRANCH_NAME
          git add -A
          git commit -m "feat: add agentic-ready scaffolding [skip ci]"
          git push origin $BRANCH_NAME
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request
        if: steps.transform.outputs.generated == 'true'
        id: pr
        run: |
          BRANCH_NAME=${{ env.BRANCH_NAME }}
          
          # Create label (ignore if exists)
          gh label create agentic-ready -c "4CAF50" -d "Agentic ready scaffolding" 2>/dev/null || true
          
          # Prepare PR body from template
          if [ -f .agentic-toolkit/.github/PR_TEMPLATE.md ]; then
            BODY_FILE=$(mktemp)
            cat .agentic-toolkit/.github/PR_TEMPLATE.md > "$BODY_FILE"
            PR_URL=$(gh pr create \
              --title "🤖 Add agentic-ready scaffolding" \
              --body-file "$BODY_FILE" \
              --base ${{ inputs.target_branch }} \
              --head $BRANCH_NAME \
              --label agentic-ready)
            rm "$BODY_FILE"
          else
            PR_URL=$(gh pr create \
              --title "🤖 Add agentic-ready scaffolding" \
              --body "Generated by [legacy-to-agentic-ready](https://github.com/vb-nattamai/legacy-to-agentic-ready)" \
              --base ${{ inputs.target_branch }} \
              --head $BRANCH_NAME \
              --label agentic-ready)
          fi
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "Pull Request created: $PR_URL"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Post success
        if: steps.transform.outputs.generated == 'true'
        run: |
          echo "✅ Transformation Complete"
          echo "PR: ${{ steps.pr.outputs.pr_url }}"
